services:
  - type: web
    name: garuda-analytics
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    healthCheckPath: /health
    healthCheckTimeout: 30
    restartPolicyType: ON_FAILURE
    restartPolicyMaxRetries: 10
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.9.16
