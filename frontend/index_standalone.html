<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garuda Analytics Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.15.0/umd/react-router-dom.min.js"></script>
    <script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
              'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
              sans-serif;
            background-color: #f5f5f5;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        
        .card {
            background-color: white;
            border-radius: 0.75rem;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        
        .btn-primary {
            background-color: #2563eb;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        
        .btn-secondary {
            background-color: #e5e7eb;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background-color: #d1d5db;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.25rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.5rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transition: border-color 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgb(37 99 235 / 0.1);
        }
        
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .alert-success {
            background-color: #f0fdf4;
            color: #10b981;
            border: 1px solid #bbf7d0;
        }
        
        .alert-error {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 50%;
            border-top-color: #2563eb;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .nav-header {
            background-color: white;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            border-bottom: 1px solid #e5e7eb;
        }
        
        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4rem;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-link {
            color: #374151;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: all 0.2s ease;
        }
        
        .nav-link:hover, .nav-link.active {
            color: #2563eb;
            background-color: rgba(37, 99, 235, 0.1);
        }
        
        .grid {
            display: grid;
            gap: 1rem;
        }
        
        .grid-cols-3 {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .bg-gray-50 {
            background-color: #f9fafb;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        
        .text-center {
            text-align: center;
        }
        
        .mb-4 {
            margin-bottom: 1rem;
        }
        
        .mt-4 {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BrowserRouter, Routes, Route, Navigate, Link, useNavigate, useLocation } = ReactRouterDOM;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ScatterChart, Scatter } = Recharts;

        // API Service
        const API_BASE = 'http://localhost:5000';
        
        const api = axios.create({
            baseURL: API_BASE,
            timeout: 30000,
            headers: { 'Content-Type': 'application/json' }
        });

        api.interceptors.request.use(config => {
            const token = localStorage.getItem('garuda_token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Login Component
        function Login() {
            const [formData, setFormData] = useState({ username: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const navigate = useNavigate();

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                try {
                    const response = await api.post('/login', formData);
                    if (response.data.success) {
                        localStorage.setItem('garuda_token', response.data.token);
                        localStorage.setItem('garuda_user', JSON.stringify({ username: response.data.username }));
                        navigate('/dashboard');
                    } else {
                        setError(response.data.message || 'Login failed');
                    }
                } catch (err) {
                    setError(err.response?.data?.message || 'Login failed');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', backgroundColor: '#f5f5f5' }}>
                    <div style={{ maxWidth: '400px', width: '100%', padding: '2rem' }}>
                        <div className="text-center mb-4">
                            <h1 style={{ fontSize: '2rem', fontWeight: 'bold', marginBottom: '0.5rem' }}>🦅 Garuda Analytics</h1>
                            <p style={{ color: '#6b7280' }}>Sign in to access your analytics dashboard</p>
                        </div>

                        <div className="card">
                            <form onSubmit={handleSubmit}>
                                {error && <div className="alert alert-error">{error}</div>}
                                
                                <div className="form-group">
                                    <label className="form-label">Username</label>
                                    <input
                                        type="text"
                                        value={formData.username}
                                        onChange={(e) => setFormData({...formData, username: e.target.value})}
                                        className="form-input"
                                        placeholder="Enter your username"
                                        disabled={loading}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Password</label>
                                    <input
                                        type="password"
                                        value={formData.password}
                                        onChange={(e) => setFormData({...formData, password: e.target.value})}
                                        className="form-input"
                                        placeholder="Enter your password"
                                        disabled={loading}
                                        required
                                    />
                                </div>

                                <button type="submit" className="btn btn-primary" style={{ width: '100%' }} disabled={loading}>
                                    {loading ? <> <div className="loading" style={{ marginRight: '0.5rem' }}></div> Signing in... </> : 'Sign In'}
                                </button>
                            </form>

                            <div style={{ marginTop: '1.5rem', paddingTop: '1rem', borderTop: '1px solid #e5e7eb' }}>
                                <p style={{ fontSize: '0.875rem', color: '#6b7280', textAlign: 'center', marginBottom: '0.75rem' }}>Demo Credentials</p>
                                <div style={{ backgroundColor: '#f9fafb', padding: '0.75rem', borderRadius: '0.375rem', fontSize: '0.875rem' }}>
                                    <p><strong>Username:</strong> admin</p>
                                    <p><strong>Password:</strong> admin123</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Dashboard Component
        function Dashboard() {
            const [dataInfo, setDataInfo] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    const response = await api.get('/api/data-info');
                    if (response.data.success) {
                        setDataInfo(response.data.data_info);
                    }
                } catch (err) {
                    setError('Failed to load data. Please upload a CSV file first.');
                } finally {
                    setLoading(false);
                }
            };

            if (loading) {
                return <div className="text-center mt-4"><div className="loading"></div><p>Loading dashboard...</p></div>;
            }

            return (
                <div className="container">
                    <div style={{ marginBottom: '2rem' }}>
                        <h1 style={{ fontSize: '2rem', fontWeight: 'bold', marginBottom: '0.5rem' }}>Analytics Dashboard</h1>
                        <p style={{ color: '#6b7280' }}>Analyze your data and run machine learning predictions</p>
                    </div>

                    {error && <div className="alert alert-error">{error}</div>}

                    {!dataInfo ? (
                        <div className="card text-center">
                            <h3 style={{ fontSize: '1.125rem', fontWeight: '500', marginBottom: '1rem' }}>No Data Available</h3>
                            <p style={{ color: '#6b7280', marginBottom: '1.5rem' }}>Please upload a CSV file to start analyzing your data</p>
                            <a href="/upload" className="btn btn-primary">Upload Dataset</a>
                        </div>
                    ) : (
                        <div className="card">
                            <h3 style={{ fontSize: '1.125rem', fontWeight: '500', marginBottom: '1rem' }}>Data Overview</h3>
                            <div className="grid grid-cols-3" style={{ marginBottom: '1.5rem' }}>
                                <div className="bg-gray-50">
                                    <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>Total Rows</p>
                                    <p style={{ fontSize: '2rem', fontWeight: 'bold' }}>{dataInfo.basic_info?.rows || 0}</p>
                                </div>
                                <div className="bg-gray-50">
                                    <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>Total Columns</p>
                                    <p style={{ fontSize: '2rem', fontWeight: 'bold' }}>{dataInfo.basic_info?.columns || 0}</p>
                                </div>
                                <div className="bg-gray-50">
                                    <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>Numeric Columns</p>
                                    <p style={{ fontSize: '2rem', fontWeight: 'bold' }}>{dataInfo.numeric_columns?.length || 0}</p>
                                </div>
                            </div>
                            
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1.5rem' }}>
                                <div>
                                    <h4 style={{ fontWeight: '500', marginBottom: '0.5rem' }}>Numeric Columns</h4>
                                    <div className="bg-gray-50" style={{ padding: '0.75rem', borderRadius: '0.375rem' }}>
                                        {dataInfo.numeric_columns?.length > 0 ? (
                                            dataInfo.numeric_columns.map(col => <p key={col} style={{ fontSize: '0.875rem', color: '#6b7280' }}>• {col}</p>)
                                        ) : (
                                            <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>No numeric columns found</p>
                                        )}
                                    </div>
                                </div>
                                <div>
                                    <h4 style={{ fontWeight: '500', marginBottom: '0.5rem' }}>Categorical Columns</h4>
                                    <div className="bg-gray-50" style={{ padding: '0.75rem', borderRadius: '0.375rem' }}>
                                        {dataInfo.categorical_columns?.length > 0 ? (
                                            dataInfo.categorical_columns.map(col => <p key={col} style={{ fontSize: '0.875rem', color: '#6b7280' }}>• {col}</p>)
                                        ) : (
                                            <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>No categorical columns found</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Upload Component
        function Upload() {
            const [selectedFile, setSelectedFile] = useState(null);
            const [uploading, setUploading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState('');
            const navigate = useNavigate();

            const handleFileSelect = (file) => {
                if (file && file.type === 'text/csv') {
                    setSelectedFile(file);
                    setError('');
                    setResult(null);
                } else {
                    setError('Please select a valid CSV file');
                }
            };

            const handleUpload = async () => {
                if (!selectedFile) {
                    setError('Please select a file first');
                    return;
                }

                setUploading(true);
                setError('');

                try {
                    const formData = new FormData();
                    formData.append('file', selectedFile);

                    const response = await api.post('/upload', formData, {
                        headers: { 'Content-Type': 'multipart/form-data' }
                    });

                    if (response.data.success) {
                        setResult(response.data);
                        setTimeout(() => navigate('/dashboard'), 2000);
                    } else {
                        setError(response.data.message || 'Upload failed');
                    }
                } catch (err) {
                    setError(err.response?.data?.message || 'Upload failed');
                } finally {
                    setUploading(false);
                }
            };

            return (
                <div className="container">
                    <div style={{ maxWidth: '800px', margin: '0 auto' }}>
                        <div style={{ marginBottom: '2rem' }}>
                            <h1 style={{ fontSize: '2rem', fontWeight: 'bold', marginBottom: '0.5rem' }}>Upload Dataset</h1>
                            <p style={{ color: '#6b7280' }}>Upload a CSV file to analyze and make predictions</p>
                        </div>

                        <div className="card">
                            <div style={{ border: '2px dashed #d1d5db', borderRadius: '0.5rem', padding: '2rem', textAlign: 'center' }}>
                                <div style={{ marginBottom: '1rem' }}>
                                    <svg style={{ width: '3rem', height: '3rem', color: '#9ca3af', margin: '0 auto' }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                    </svg>
                                </div>
                                
                                <div style={{ marginBottom: '1rem' }}>
                                    <label>
                                        <input
                                            type="file"
                                            accept=".csv"
                                            onChange={(e) => handleFileSelect(e.target.files[0])}
                                            style={{ display: 'none' }}
                                        />
                                        <span className="btn btn-primary">Choose CSV File</span>
                                    </label>
                                    <p style={{ fontSize: '0.875rem', color: '#6b7280', marginTop: '0.5rem' }}>or drag and drop your CSV file here</p>
                                </div>
                            </div>

                            {error && <div className="alert alert-error mt-4">{error}</div>}

                            {selectedFile && (
                                <div style={{ marginTop: '1.5rem', padding: '1rem', backgroundColor: '#f9fafb', borderRadius: '0.5rem' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                        <div>
                                            <h4 style={{ fontWeight: '500' }}>{selectedFile.name}</h4>
                                            <p style={{ fontSize: '0.875rem', color: '#6b7280' }}>{(selectedFile.size / 1024).toFixed(2)} KB</p>
                                        </div>
                                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                                            <button className="btn btn-secondary" onClick={() => setSelectedFile(null)} disabled={uploading}>Clear</button>
                                            <button className="btn btn-primary" onClick={handleUpload} disabled={uploading}>
                                                {uploading ? <> <div className="loading" style={{ marginRight: '0.5rem' }}></div> Uploading... </> : 'Upload File'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {result && result.success && (
                                <div className="alert alert-success mt-4">
                                    <h4 style={{ fontWeight: '500', marginBottom: '0.5rem' }}>Upload Successful!</h4>
                                    <p style={{ fontSize: '0.875rem' }}>{result.message}</p>
                                    <p style={{ fontSize: '0.875rem', marginTop: '0.5rem' }}>Redirecting to dashboard...</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Layout Component
        function Layout() {
            const navigate = useNavigate();
            const location = useLocation();
            const user = JSON.parse(localStorage.getItem('garuda_user') || '{}');

            const handleLogout = () => {
                localStorage.removeItem('garuda_token');
                localStorage.removeItem('garuda_user');
                navigate('/login');
            };

            const isActive = (path) => location.pathname === path;

            return (
                <div style={{ minHeight: '100vh', backgroundColor: '#f5f5f5' }}>
                    <header className="nav-header">
                        <div className="container">
                            <div className="nav-content">
                                <Link to="/dashboard" style={{ fontSize: '1.25rem', fontWeight: 'bold', color: '#2563eb', textDecoration: 'none' }}>
                                    🦅 Garuda Analytics
                                </Link>

                                <nav className="nav-links">
                                    <Link to="/dashboard" className={`nav-link ${isActive('/dashboard') ? 'active' : ''}`}>Dashboard</Link>
                                    <Link to="/upload" className={`nav-link ${isActive('/upload') ? 'active' : ''}`}>Upload Data</Link>
                                </nav>

                                <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                                    <span style={{ fontSize: '0.875rem' }}>
                                        <span style={{ color: '#6b7280' }}>Welcome, </span>
                                        <span style={{ fontWeight: '500' }}>{user.username}</span>
                                    </span>
                                    <button className="btn btn-secondary" onClick={handleLogout}>Logout</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main style={{ padding: '1.5rem 0' }}>
                        <Routes>
                            <Route index element={<Navigate to="/dashboard" />} />
                            <Route path="dashboard" element={<Dashboard />} />
                            <Route path="upload" element={<Upload />} />
                        </Routes>
                    </main>
                </div>
            );
        }

        // App Component
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const token = localStorage.getItem('garuda_token');
                setIsAuthenticated(!!token);
                setLoading(false);
            }, []);

            if (loading) {
                return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <div className="loading"></div>
                </div>;
            }

            return (
                <BrowserRouter>
                    <Routes>
                        <Route path="/login" element={!isAuthenticated ? <Login /> : <Navigate to="/dashboard" />} />
                        <Route path="/" element={isAuthenticated ? <Layout /> : <Navigate to="/login" />}>
                            <Route index element={<Navigate to="/dashboard" />} />
                            <Route path="dashboard" element={<Dashboard />} />
                            <Route path="upload" element={<Upload />} />
                        </Route>
                        <Route path="*" element={<Navigate to="/dashboard" />} />
                    </Routes>
                </BrowserRouter>
            );
        }

        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
